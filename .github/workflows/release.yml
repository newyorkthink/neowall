name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 0.5.0)"
        required: true
        type: string

# Common meson configure flags reused by every job.
env:
  MESON_ARGS: "--prefix=/usr --buildtype=release -Doptimization=2 -Db_lto=true"

jobs:
  # ---------------------------------------------------------------------------
  # Arch Linux — native pacman package (.pkg.tar.zst) + plain tarball
  # ---------------------------------------------------------------------------
  build-arch:
    name: Build (Arch / pacman)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja wayland wayland-protocols \
            egl-wayland mesa libpng libjpeg-turbo libx11 libxrandr sudo

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          meson setup build $MESON_ARGS
          ninja -C build

      - name: Plain tarball
        run: |
          mkdir -p dist
          install -m755 build/neowall dist/neowall
          strip dist/neowall
          tar -C dist -czf dist/neowall-linux-x86_64-arch.tar.gz neowall

      - name: Build pacman package
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          BUILD=build PKGNAME=neowall PKGVER="$V"
          # makepkg cannot run as root; use a throwaway builder user.
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          cat > /tmp/PKGBUILD <<EOF
          pkgname=neowall
          pkgver=$V
          pkgrel=1
          pkgdesc="GPU-accelerated live shader wallpapers for Wayland and X11"
          arch=('x86_64')
          url="https://github.com/1ay1/neowall"
          license=('MIT')
          depends=('wayland' 'mesa' 'libpng' 'libjpeg-turbo' 'libx11' 'libxrandr')
          provides=('neowall')
          conflicts=('neowall-git')
          options=(!debug)
          package() {
            DESTDIR="\$pkgdir" ninja -C "$GITHUB_WORKSPACE/build" install
            install -Dm644 "$GITHUB_WORKSPACE/LICENSE" "\$pkgdir/usr/share/licenses/neowall/LICENSE"
          }
          EOF
          cp /tmp/PKGBUILD "$GITHUB_WORKSPACE/PKGBUILD.ci"
          sudo -u builder bash -c "cd '$GITHUB_WORKSPACE' && cp PKGBUILD.ci PKGBUILD && makepkg -f --nodeps --noconfirm"
          mv "$GITHUB_WORKSPACE"/neowall-*.pkg.tar.zst dist/
          rm -f "$GITHUB_WORKSPACE/PKGBUILD" "$GITHUB_WORKSPACE/PKGBUILD.ci"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-arch
          path: dist/*

  # ---------------------------------------------------------------------------
  # Debian / Ubuntu — .deb (built natively, packaged with fpm)
  # ---------------------------------------------------------------------------
  build-debian:
    name: Build (Debian / .deb)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential git pkg-config meson ninja-build \
            libwayland-dev wayland-protocols libwayland-egl1-mesa \
            libx11-dev libxrandr-dev libegl1-mesa-dev libgl-dev \
            libpng-dev libjpeg-dev ruby ruby-dev rubygems
          gem install --no-document fpm

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Build & stage
        run: |
          meson setup build $MESON_ARGS
          ninja -C build
          DESTDIR="$PWD/pkgroot" ninja -C build install

      - name: Plain tarball
        run: |
          mkdir -p dist
          install -m755 build/neowall dist/neowall
          strip dist/neowall
          tar -C dist -czf dist/neowall-linux-x86_64-debian.tar.gz neowall
          rm -f dist/neowall

      - name: Build .deb
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          fpm -s dir -t deb -n neowall -v "$V" \
            --description "GPU-accelerated live shader wallpapers for Wayland and X11" \
            --url "https://github.com/1ay1/neowall" \
            --license MIT --maintainer "1ay1 <noreply@github.com>" \
            --architecture amd64 \
            --depends "libwayland-client0" --depends "libwayland-egl1" \
            --depends "libegl1" --depends "libgl1" \
            --depends "libpng16-16" --depends "libjpeg62-turbo" \
            --depends "libx11-6" --depends "libxrandr2" \
            --deb-no-default-config-files \
            -C pkgroot -p "dist/neowall_${V}_amd64.deb" usr

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-debian
          path: dist/*

  # ---------------------------------------------------------------------------
  # Ubuntu (newer libs) — .deb tuned for 24.04+
  # ---------------------------------------------------------------------------
  build-ubuntu:
    name: Build (Ubuntu / .deb)
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config meson ninja-build \
            libwayland-dev wayland-protocols libwayland-egl1 \
            libx11-dev libxrandr-dev libegl1-mesa-dev libgl-dev \
            libpng-dev libjpeg-dev ruby ruby-dev
          sudo gem install --no-document fpm

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Build & stage
        run: |
          meson setup build $MESON_ARGS
          ninja -C build
          DESTDIR="$PWD/pkgroot" ninja -C build install

      - name: Build .deb
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dist
          fpm -s dir -t deb -n neowall -v "$V" --iteration ubuntu24.04 \
            --description "GPU-accelerated live shader wallpapers for Wayland and X11" \
            --url "https://github.com/1ay1/neowall" \
            --license MIT --maintainer "1ay1 <noreply@github.com>" \
            --architecture amd64 \
            --depends "libwayland-client0" --depends "libwayland-egl1" \
            --depends "libegl1" --depends "libgl1" \
            --depends "libpng16-16t64" --depends "libjpeg-turbo8" \
            --depends "libx11-6" --depends "libxrandr2" \
            --deb-no-default-config-files \
            -C pkgroot -p "dist/neowall_${V}-ubuntu24.04_amd64.deb" usr

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-ubuntu
          path: dist/*

  # ---------------------------------------------------------------------------
  # Fedora — .rpm
  # ---------------------------------------------------------------------------
  build-fedora:
    name: Build (Fedora / .rpm)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y gcc meson ninja-build wayland-devel mesa-libGL-devel \
            mesa-libEGL-devel libpng-devel libjpeg-turbo-devel \
            wayland-protocols-devel libX11-devel libXrandr-devel git \
            ruby ruby-devel rpm-build redhat-rpm-config
          gem install --no-document fpm

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Build & stage
        run: |
          meson setup build $MESON_ARGS
          ninja -C build
          DESTDIR="$PWD/pkgroot" ninja -C build install

      - name: Plain tarball
        run: |
          mkdir -p dist
          install -m755 build/neowall dist/neowall
          strip dist/neowall
          tar -C dist -czf dist/neowall-linux-x86_64-fedora.tar.gz neowall
          rm -f dist/neowall

      - name: Build .rpm
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          fpm -s dir -t rpm -n neowall -v "$V" \
            --description "GPU-accelerated live shader wallpapers for Wayland and X11" \
            --url "https://github.com/1ay1/neowall" \
            --license MIT --maintainer "1ay1 <noreply@github.com>" \
            --architecture x86_64 \
            --depends "wayland-libs" --depends "mesa-libGL" --depends "mesa-libEGL" \
            --depends "libpng" --depends "libjpeg-turbo" \
            --depends "libX11" --depends "libXrandr" \
            -C pkgroot -p "dist/neowall-${V}-1.fc.x86_64.rpm" usr

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-fedora
          path: dist/*

  # ---------------------------------------------------------------------------
  # openSUSE — .rpm (zypper deps differ from Fedora)
  # ---------------------------------------------------------------------------
  build-opensuse:
    name: Build (openSUSE / .rpm)
    runs-on: ubuntu-latest
    # Leap's older Mesa headers occasionally lag; keep it from blocking the
    # release — rpm users are also served by the Fedora package and AppImage.
    continue-on-error: true
    container:
      image: opensuse/tumbleweed:latest
    steps:
      - name: Install dependencies
        run: |
          # Tumbleweed ships modern Ruby (needed by current fpm). Retry to
          # ride out occasional mirror 404s during package preload.
          for i in 1 2 3; do
            zypper --non-interactive --gpg-auto-import-keys refresh && break
            sleep 5
          done
          for i in 1 2 3; do
            zypper --non-interactive install --no-recommends \
              gcc gcc-c++ meson ninja \
              wayland-devel wayland-protocols-devel Mesa-libGL-devel Mesa-libEGL-devel \
              Mesa-libGLESv3-devel \
              libpng16-devel libjpeg8-devel libX11-devel libXrandr-devel git \
              ruby ruby-devel rpm-build tar gzip gawk make && break
            sleep 5
          done
          gem install --no-document fpm

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Build & stage
        run: |
          meson setup build $MESON_ARGS
          ninja -C build
          DESTDIR="$PWD/pkgroot" ninja -C build install

      - name: Build .rpm
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dist
          FPM="$(command -v fpm || true)"
          [ -z "$FPM" ] && FPM="$(ruby -e 'print Gem.bindir')/fpm"
          [ -x "$FPM" ] || FPM="$(find / -name fpm -type f -perm -u+x 2>/dev/null | head -1)"
          echo "using fpm: $FPM"
          "$FPM" -s dir -t rpm -n neowall -v "$V" --iteration "1.suse" \
            --description "GPU-accelerated live shader wallpapers for Wayland and X11" \
            --url "https://github.com/1ay1/neowall" \
            --license MIT --maintainer "1ay1 <noreply@github.com>" \
            --architecture x86_64 \
            --depends "libwayland-client0" --depends "Mesa-libGL1" --depends "Mesa-libEGL1" \
            --depends "libpng16-16" --depends "libjpeg8" \
            --depends "libX11-6" --depends "libXrandr2" \
            -C pkgroot -p "dist/neowall-${V}-1.suse.x86_64.rpm" usr

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-opensuse
          path: dist/*

  # ---------------------------------------------------------------------------
  # AppImage — distro-agnostic, runs anywhere with glibc >= build host
  # ---------------------------------------------------------------------------
  build-appimage:
    name: Build (Ubuntu 22.04 AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config meson ninja-build \
            curl file binutils desktop-file-utils fuse3 libfuse2 \
            libwayland-dev wayland-protocols libwayland-egl1 \
            libx11-dev libxrandr-dev libegl1-mesa-dev libgl-dev \
            libpng-dev libjpeg-dev

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"

      - name: Build, deploy, and verify AppImage
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          packaging/build-appimage-ubuntu22.04.sh

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-appimage
          path: dist/*

  # ---------------------------------------------------------------------------
  # Release — gather every artifact, source tarball, checksums; publish
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs:
      - build-arch
      - build-debian
      - build-ubuntu
      - build-fedora
      - build-opensuse
      - build-appimage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "TAG=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=${GITHUB_REF#refs/tags/}
            echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \
               -o -name '*.AppImage' -o -name '*.pkg.tar.zst' \) \
            -exec cp -v {} release/ \;

          # Source tarball
          tar -czf "release/neowall-${{ steps.version.outputs.VERSION }}-source.tar.gz" \
            --exclude='.git' --exclude='release' --exclude='artifacts' \
            --exclude='.github' --exclude='build' --exclude='builddir' \
            --exclude='AppDir' --exclude='pkgroot' \
            --transform "s,^,neowall-${{ steps.version.outputs.VERSION }}/," \
            *

          cd release && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags "${{ steps.version.outputs.TAG }}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            {
              echo "CHANGELOG<<EOF"
              git log "$PREV_TAG..${{ steps.version.outputs.TAG }}" --no-merges --pretty=format:"- %s" | head -40
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "CHANGELOG=Initial release" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: NeoWall ${{ steps.version.outputs.TAG }}
          body: |
            ## NeoWall ${{ steps.version.outputs.VERSION }}

            GPU-accelerated live shader wallpapers for Wayland & X11.

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Packages

            Pick the native package for your distro — each pulls in the right runtime deps.

            | Distro | File | Install |
            |--------|------|---------|
            | Arch / Manjaro | `neowall-*-x86_64.pkg.tar.zst` | `sudo pacman -U <file>` |
            | Debian / Mint | `neowall_*_amd64.deb` | `sudo apt install ./<file>` |
            | Ubuntu 24.04+ | `neowall_*-ubuntu24.04_amd64.deb` | `sudo apt install ./<file>` |
            | Fedora / RHEL | `neowall-*.fc.x86_64.rpm` | `sudo dnf install ./<file>` |
            | openSUSE | `neowall-*.suse.x86_64.rpm` | `sudo zypper install ./<file>` |
            | Any (universal) | `neowall-*-x86_64.AppImage` | `chmod +x <file> && ./<file>` |

            ### Plain binaries (no package manager)

            | File | Build |
            |------|-------|
            | `neowall-linux-x86_64-arch.tar.gz` | glibc (Arch) |
            | `neowall-linux-x86_64-debian.tar.gz` | glibc (Debian bookworm) |
            | `neowall-linux-x86_64-fedora.tar.gz` | glibc (Fedora) |
            | `neowall-${{ steps.version.outputs.VERSION }}-source.tar.gz` | source |

            ```bash
            tar -xzf neowall-linux-x86_64-*.tar.gz
            sudo install -m755 neowall /usr/local/bin/
            ```

            #### Arch (AUR, tracks git)
            ```bash
            yay -S neowall-git
            ```

            #### From source
            ```bash
            tar -xzf neowall-${{ steps.version.outputs.VERSION }}-source.tar.gz
            cd neowall-${{ steps.version.outputs.VERSION }}
            meson setup build --buildtype=release
            ninja -C build
            sudo ninja -C build install
            ```

            ### Requirements
            - OpenGL 3.3+ capable GPU
            - Wayland compositor with layer-shell (Hyprland, Sway, River, …) **or** X11

            Verify downloads against `SHA256SUMS.txt`.
          files: |
            release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
